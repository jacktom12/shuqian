<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>我的书签</title>
<style>
  :root {
    --bg: #0f1115;
    --card: #1a1d24;
    --card-hover: #23272f;
    --accent: #4f8cff;
    --text: #e8e9ec;
    --text-dim: #9aa0aa;
    --radius: 18px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: radial-gradient(circle at 50% 0%, #1c2028 0%, #0f1115 60%);
    color: var(--text);
    min-height: 100vh;
    padding: 40px 20px 80px;
  }
  .search-wrap {
    max-width: 720px;
    margin: 60px auto 50px;
    display: flex;
    gap: 8px;
  }
  select#engine {
    background: var(--card);
    color: var(--text);
    border: 1px solid #2a2e37;
    border-radius: var(--radius);
    padding: 0 16px;
    font-size: 15px;
    outline: none;
    cursor: pointer;
  }
  .search-box {
    flex: 1;
    display: flex;
    background: var(--card);
    border: 1px solid #2a2e37;
    border-radius: var(--radius);
    padding: 4px 6px 4px 18px;
    align-items: center;
  }
  .search-box input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 16px;
    padding: 12px 0;
  }
  .search-box button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    padding: 10px 22px;
    cursor: pointer;
    font-size: 15px;
  }
  .toolbar {
    max-width: 1100px;
    margin: 0 auto 24px;
    display: flex;
    justify-content: flex-end;
    gap: 10px;
  }
  .toolbar button {
    background: var(--card);
    color: var(--text);
    border: 1px solid #2a2e37;
    border-radius: 12px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 14px;
  }
  .toolbar button:hover { background: var(--card-hover); }
  .grid {
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 18px;
  }
  .bm-card {
    position: relative;
    background: var(--card);
    border-radius: var(--radius);
    padding: 16px 8px 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    cursor: pointer;
    transition: transform .15s, background .15s;
    text-decoration: none;
    color: var(--text);
  }
  .bm-card:hover { transform: translateY(-3px); background: var(--card-hover); }
  .bm-icon {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .bm-icon img { width: 28px; height: 28px; object-fit: contain; }
  .bm-title {
    font-size: 12.5px;
    line-height: 1.3;
    max-width: 100px;
    overflow: hidden;
    text-overflow: ellipsis;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .bm-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: none;
    gap: 4px;
  }
  .bm-card:hover .bm-actions { display: flex; }
  .bm-actions span {
    background: rgba(0,0,0,0.5);
    border-radius: 8px;
    width: 20px;
    height: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  }
  .fav-badge {
    position: absolute;
    top: 6px;
    left: 8px;
    color: #ffd24f;
    font-size: 13px;
  }
  /* Modal */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 100;
  }
  .overlay.show { display: flex; }
  .modal {
    background: var(--card);
    border-radius: 20px;
    padding: 26px 28px;
    width: 340px;
    max-width: 90vw;
  }
  .modal h3 { margin: 0 0 16px; font-size: 17px; }
  .modal label { font-size: 13px; color: var(--text-dim); display: block; margin: 10px 0 4px; }
  .modal input, .modal textarea {
    width: 100%;
    background: #12141a;
    border: 1px solid #2a2e37;
    border-radius: 10px;
    color: var(--text);
    padding: 9px 10px;
    font-size: 14px;
    outline: none;
  }
  .modal .row { display: flex; align-items: center; gap: 8px; margin-top: 12px; }
  .modal .btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
  .modal .btns button {
    border: none; border-radius: 10px; padding: 8px 18px; cursor: pointer; font-size: 14px;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: #2a2e37; color: var(--text); }
  .empty-tip { text-align: center; color: var(--text-dim); margin-top: 60px; }
</style>
</head>
<body>

<div class="search-wrap">
  <select id="engine">
    <option value="google">谷歌</option>
    <option value="bing">必应</option>
    <option value="douban">豆瓣</option>
    <option value="zhihu">知乎</option>
    <option value="bilibili">B站</option>
    <option value="youtube">油管</option>
  </select>
  <div class="search-box">
    <input id="query" type="text" placeholder="搜索..." autofocus />
    <button id="go">搜索</button>
  </div>
</div>

<div class="toolbar">
  <button id="addBtn">+ 添加书签</button>
</div>

<div class="grid" id="grid"></div>
<div class="empty-tip" id="emptyTip" style="display:none;">暂无书签，点击右上角添加</div>

<!-- 密码输入弹窗 -->
<div class="overlay" id="pwOverlay">
  <div class="modal">
    <h3>请输入密码</h3>
    <label>管理密码</label>
    <input type="password" id="pwInput" placeholder="输入密码以增删改" />
    <div class="btns">
      <button class="btn-secondary" id="pwCancel">取消</button>
      <button class="btn-primary" id="pwConfirm">确认</button>
    </div>
  </div>
</div>

<!-- 新增/编辑书签弹窗 -->
<div class="overlay" id="editOverlay">
  <div class="modal">
    <h3 id="editTitle">添加书签</h3>
    <label>标题</label>
    <input id="f-title" type="text" />
    <label>URL</label>
    <input id="f-url" type="text" placeholder="https://" />
    <label>分类</label>
    <input id="f-category" type="text" />
    <label>标签（逗号分隔）</label>
    <input id="f-tags" type="text" />
    <label>描述</label>
    <input id="f-desc" type="text" />
    <div class="row">
      <input type="checkbox" id="f-fav" />
      <label style="margin:0;">收藏</label>
    </div>
    <div class="btns">
      <button class="btn-secondary" id="editCancel">取消</button>
      <button class="btn-primary" id="editSave">保存</button>
    </div>
  </div>
</div>

<script>
/* ====== 配置：改成你自己部署的 Worker 地址 ====== */
const API_BASE = "https://mrksss.199105.xyz";
const TOKEN_KEY = "bm_auth_token";
const TOKEN_EXP_KEY = "bm_auth_token_exp";
const TOKEN_TTL_MS = 365 * 24 * 60 * 60 * 1000;

const SEARCH_ENGINES = {
  google:   q => `https://www.google.com/search?q=${encodeURIComponent(q)}`,
  bing:     q => `https://www.bing.com/search?q=${encodeURIComponent(q)}`,
  douban:   q => `https://www.douban.com/search?q=${encodeURIComponent(q)}`,
  zhihu:    q => `https://www.zhihu.com/search?type=content&q=${encodeURIComponent(q)}`,
  bilibili: q => `https://search.bilibili.com/all?keyword=${encodeURIComponent(q)}`,
  youtube:  q => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`,
};

function favicon(url) {
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?sz=64&domain=${u.hostname}`;
  } catch (e) {
    return "";
  }
}

function getToken() {
  const exp = parseInt(localStorage.getItem(TOKEN_EXP_KEY) || "0", 10);
  if (Date.now() > exp) {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(TOKEN_EXP_KEY);
    return null;
  }
  return localStorage.getItem(TOKEN_KEY);
}

function setToken(token) {
  localStorage.setItem(TOKEN_KEY, token);
  localStorage.setItem(TOKEN_EXP_KEY, String(Date.now() + TOKEN_TTL_MS));
}

async function authFetch(path, options = {}) {
  const token = getToken();
  options.headers = Object.assign({}, options.headers, {
    "Content-Type": "application/json",
    ...(token ? { Authorization: `Bearer ${token}` } : {}),
  });
  return fetch(API_BASE + path, options);
}

/* ---------- 密码流程 ---------- */
let pendingAction = null; // 待执行的回调（密码验证通过后调用）

function requirePassword(action) {
  if (getToken()) {
    action();
    return;
  }
  pendingAction = action;
  document.getElementById("pwInput").value = "";
  document.getElementById("pwOverlay").classList.add("show");
}

document.getElementById("pwCancel").onclick = () => {
  document.getElementById("pwOverlay").classList.remove("show");
  pendingAction = null;
};

document.getElementById("pwConfirm").onclick = async () => {
  const pw = document.getElementById("pwInput").value;
  const res = await fetch(API_BASE + "/api/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ password: pw }),
  });
  const data = await res.json();
  if (data.ok) {
    setToken(data.token);
    document.getElementById("pwOverlay").classList.remove("show");
    if (pendingAction) pendingAction();
    pendingAction = null;
  } else {
    alert("密码错误");
  }
};

/* ---------- 搜索 ---------- */
document.getElementById("go").onclick = doSearch;
document.getElementById("query").addEventListener("keydown", e => {
  if (e.key === "Enter") doSearch();
});
function doSearch() {
  const q = document.getElementById("query").value.trim();
  if (!q) return;
  const engine = document.getElementById("engine").value;
  window.open(SEARCH_ENGINES[engine](q), "_blank");
}

/* ---------- 书签渲染 ---------- */
let bookmarks = [];

async function loadBookmarks() {
  try {
    const res = await fetch(API_BASE + "/api/bookmarks");
    const data = await res.json();
    bookmarks = data.ok ? data.data : [];
  } catch (e) {
    bookmarks = [];
  }
  render();
}

function render() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  document.getElementById("emptyTip").style.display = bookmarks.length ? "none" : "block";
  bookmarks
    .sort((a, b) => (b.favorite - a.favorite))
    .forEach(bm => {
      const card = document.createElement("a");
      card.className = "bm-card";
      card.href = bm.url;
      card.target = "_blank";
      card.innerHTML = `
        ${bm.favorite ? '<span class="fav-badge">★</span>' : ""}
        <span class="bm-actions">
          <span data-act="edit">✎</span>
          <span data-act="del">✕</span>
        </span>
        <div class="bm-icon"><img src="${favicon(bm.url)}" onerror="this.style.display='none'"/></div>
        <div class="bm-title">${escapeHtml(bm.title || bm.url)}</div>
      `;
      card.querySelector('[data-act="edit"]').addEventListener("click", ev => {
        ev.preventDefault(); ev.stopPropagation();
        requirePassword(() => openEditModal(bm));
      });
      card.querySelector('[data-act="del"]').addEventListener("click", ev => {
        ev.preventDefault(); ev.stopPropagation();
        requirePassword(() => deleteBookmark(bm.id));
      });
      grid.appendChild(card);
    });
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

/* ---------- 增/改 弹窗 ---------- */
const editOverlay = document.getElementById("editOverlay");
let editingId = null;

function openEditModal(bm) {
  editingId = bm ? bm.id : null;
  document.getElementById("editTitle").textContent = bm ? "编辑书签" : "添加书签";
  document.getElementById("f-title").value = bm ? bm.title : "";
  document.getElementById("f-url").value = bm ? bm.url : "";
  document.getElementById("f-category").value = bm ? bm.category : "";
  document.getElementById("f-tags").value = bm ? (bm.tags || []).join(",") : "";
  document.getElementById("f-desc").value = bm ? bm.desc : "";
  document.getElementById("f-fav").checked = bm ? !!bm.favorite : false;
  editOverlay.classList.add("show");
}

document.getElementById("addBtn").onclick = () => requirePassword(() => openEditModal(null));
document.getElementById("editCancel").onclick = () => editOverlay.classList.remove("show");

document.getElementById("editSave").onclick = async () => {
  const payload = {
    title: document.getElementById("f-title").value.trim(),
    url: document.getElementById("f-url").value.trim(),
    category: document.getElementById("f-category").value.trim() || "未分类",
    tags: document.getElementById("f-tags").value.split(",").map(s => s.trim()).filter(Boolean),
    desc: document.getElementById("f-desc").value.trim(),
    favorite: document.getElementById("f-fav").checked,
  };
  if (!payload.url) { alert("URL 不能为空"); return; }

  if (editingId) {
    await authFetch(`/api/bookmarks/${editingId}`, { method: "PUT", body: JSON.stringify(payload) });
  } else {
    await authFetch(`/api/bookmarks`, { method: "POST", body: JSON.stringify(payload) });
  }
  editOverlay.classList.remove("show");
  await loadBookmarks();
};

async function deleteBookmark(id) {
  if (!confirm("确定删除这个书签吗？")) return;
  await authFetch(`/api/bookmarks/${id}`, { method: "DELETE" });
  await loadBookmarks();
}

loadBookmarks();
</script>
</body>
</html>
