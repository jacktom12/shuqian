<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>我的书签</title>
<script src="https://code.iconify.design/3/3.1.0/iconify.min.js"></script>
<style>
  :root {
    --glass-bg: rgba(255, 255, 255, 0.08);
    --glass-bg-strong: rgba(255, 255, 255, 0.14);
    --glass-border: rgba(255, 255, 255, 0.18);
    --text: #f2f3f7;
    --text-dim: rgba(242, 243, 247, 0.6);
    --accent: #7aa2ff;
    --accent2: #a58bff;
    --accent-glow: rgba(122, 162, 255, 0.55);
    --radius-lg: 26px;
    --radius-md: 18px;
    --radius-sm: 12px;
    --danger: #ff6b6b;
  }
  
  /* 隐藏全局和局部滚动条 */
  ::-webkit-scrollbar {
    display: none;
    width: 0;
    height: 0;
  }
  * { 
    box-sizing: border-box; 
    scrollbar-width: none; 
    -ms-overflow-style: none;
  }

  /* 核心布局变更：整体固定，禁止 body 滚动 */
  html, body {
    margin: 0;
    height: 100vh;
    overflow: hidden; 
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--text);
  }
  
  #bg {
    position: fixed; inset: 0; z-index: -2;
    background-size: cover; background-position: center;
    filter: brightness(0.55) saturate(1.1);
    transition: opacity 0.6s ease;
  }
  #bg-overlay {
    position: fixed; inset: 0; z-index: -1;
    background: linear-gradient(160deg, rgba(10,12,20,0.35) 0%, rgba(10,12,20,0.65) 100%);
  }
  
  .layout {
    display: flex;
    height: 100vh;
    padding: 32px;
    gap: 28px;
  }
  
  /* -------- Sidebar (固定高度，内部滚动) -------- */
  .sidebar {
    width: 180px;
    flex-shrink: 0;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border-radius: var(--radius-lg);
    padding: 26px 14px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    height: 100%;
    overflow-y: auto;
  }
  .sidebar h2 {
    font-size: 15px; font-weight: 600; margin: 0 0 18px 6px;
    color: var(--text); letter-spacing: 0.5px;
  }
  .cat-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 12px; margin-bottom: 4px;
    border-radius: var(--radius-sm); cursor: pointer;
    font-size: 14px; color: var(--text-dim);
    transition: all 0.2s ease;
  }
  .cat-item:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .cat-item.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 4px 18px var(--accent-glow);
  }
  .cat-item-left { display: flex; align-items: center; gap: 6px; }
  .cat-count {
    font-size: 11px; opacity: 0.75;
    background: rgba(255,255,255,0.12);
    padding: 1px 8px; border-radius: 10px;
  }
  .cat-item.active .cat-count { background: rgba(255,255,255,0.25); }

  /* -------- Main Area (纵向 Flex，头部固定) -------- */
  .main { 
    flex: 1; 
    display: flex;
    flex-direction: column;
    min-width: 0; 
    height: 100%;
  }

  .topbar { 
    display: flex; align-items: center; gap: 14px; 
    margin-bottom: 34px; position: relative; z-index: 60;
    flex-shrink: 0; 
  }

  .search-shell {
    flex: 1; display: flex; align-items: center;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(24px) saturate(150%);
    -webkit-backdrop-filter: blur(24px) saturate(150%);
    border-radius: 999px;
    padding: 6px 8px 6px 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    position: relative;
    z-index: 60;
  }

  .custom-select { position: relative; flex-shrink: 0; }
  .cs-trigger {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px; border-radius: 999px; cursor: pointer;
    font-size: 14.5px; color: var(--text); user-select: none;
    transition: background 0.2s; white-space: nowrap;
  }
  .cs-trigger:hover { background: rgba(255,255,255,0.08); }
  .cs-trigger .arrow { font-size: 14px; opacity: 0.6; transition: transform 0.2s; display: flex; align-items: center;}
  .custom-select.open .cs-trigger .arrow { transform: rotate(180deg); }
  .cs-options {
    position: absolute; top: calc(100% + 10px); left: 0; min-width: 130px;
    background: rgba(28, 30, 40, 0.85); border: 1px solid var(--glass-border);
    backdrop-filter: blur(26px) saturate(160%); border-radius: 16px;
    padding: 8px; box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    opacity: 0; transform: translateY(-8px); pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease; z-index: 500;
  }
  .custom-select.open .cs-options { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .cs-option {
    padding: 9px 14px; border-radius: 10px; font-size: 14px; cursor: pointer;
    color: var(--text-dim); transition: background 0.15s, color 0.15s;
  }
  .cs-option:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .cs-option.selected { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }

  .search-shell input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 16px; padding: 12px 6px;
  }
  .search-shell input::placeholder { color: var(--text-dim); }

  .suggest-wrap { position: relative; flex: 1; }
  .suggest-list {
    position: absolute; top: calc(100% + 12px); left: 0; right: 0;
    background: rgba(28, 30, 40, 0.88); border: 1px solid var(--glass-border);
    backdrop-filter: blur(28px) saturate(160%); border-radius: 16px; padding: 6px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.45); opacity: 0; transform: translateY(-8px);
    pointer-events: none; transition: opacity 0.16s ease, transform 0.16s ease;
    z-index: 400; max-height: 320px; overflow-y: auto;
  }
  .suggest-list.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .suggest-item {
    padding: 10px 14px; border-radius: 10px; font-size: 14px; color: var(--text-dim);
    cursor: pointer; display: flex; align-items: center; gap: 10px;
    transition: background 0.14s, color 0.14s;
  }
  .suggest-item .s-icon { font-size: 16px; opacity: 0.5; flex-shrink: 0; display:flex;}
  .suggest-item:hover, .suggest-item.highlight { background: rgba(255,255,255,0.1); color: var(--text); }
  
  .search-shell button {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 50%;
    width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; box-shadow: 0 4px 16px var(--accent-glow);
    transition: transform 0.15s;
  }
  .search-shell button:hover { transform: translateY(-1px); }

  .top-actions { display: flex; gap: 12px; flex-shrink: 0; }
  
  .icon-btn {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    backdrop-filter: blur(24px); display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 20px; flex-shrink: 0; color: var(--text);
    transition: background 0.2s, transform 0.2s, color 0.2s;
  }
  .icon-btn:hover { background: var(--glass-bg-strong); transform: rotate(10deg); }
  .icon-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border-color: transparent; box-shadow: 0 4px 16px var(--accent-glow); transform: none;
  }

  .toolbar {
    display: flex; justify-content: space-between; align-items: center; 
    margin-bottom: 22px; flex-shrink: 0; 
  }
  .bm-search-shell {
    display: flex; align-items: center; gap: 10px;
    background: var(--glass-bg); border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(140%); border-radius: 16px; padding: 10px 16px;
    flex: 1; max-width: 460px;
  }
  .bm-search-icon { font-size: 18px; color: var(--text-dim); flex-shrink: 0; display:flex;}
  .bm-search-shell input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 14px;
  }
  .bm-search-shell input::placeholder { color: var(--text-dim); }
  .bm-search-clear {
    cursor: pointer; color: var(--text-dim); font-size: 18px;
    padding: 2px; border-radius: 6px; transition: background 0.15s, color 0.15s; display:flex;
  }
  .bm-search-clear:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  .clock {
    font-size: 14px; color: var(--text-dim); font-family: monospace;
    background: var(--glass-bg); padding: 10px 16px; border-radius: 14px;
    border: 1px solid var(--glass-border); backdrop-filter: blur(10px); letter-spacing: 0.5px;
  }

  /* -------- Content Scroll Area (只有这部分独立滚动) -------- */
  .content-scroll {
    flex: 1;
    overflow-y: auto;
    padding-bottom: 32px; /* 底部留白 */
  }

  .section-title {
    font-size: 13px; color: var(--text-dim); letter-spacing: 1px;
    margin: 0 0 16px 4px; text-transform: uppercase;
  }

  .grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
    gap: 18px; position: relative; z-index: 1;
  }
  
  /* 透明卡片：默认移除背景和边框，悬停才显示毛玻璃 */
  .bm-card {
    position: relative; 
    background: transparent; 
    border: 1px solid transparent; 
    border-radius: var(--radius-md); padding: 20px 10px 14px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    cursor: pointer; transition: all 0.2s ease;
    text-decoration: none; color: var(--text);
  }
  .bm-card:hover {
    transform: translateY(-5px); 
    background: var(--glass-bg-strong); 
    border-color: var(--glass-border);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    box-shadow: 0 12px 28px rgba(0,0,0,0.3);
  }
  
  .bm-icon {
    width: 52px; height: 52px; border-radius: 50%;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; margin-bottom: 10px;
  }
  .bm-icon img { width: 34px; height: 34px; object-fit: contain; }
  .bm-title {
    font-size: 12.5px; line-height: 1.35; max-width: 106px;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    text-shadow: 0 1px 4px rgba(0,0,0,0.5); /* 增加一层阴影，防止在亮色壁纸下看不清字 */
  }
  
  .bm-actions {
    position: absolute; top: 8px; right: 8px; display: none; gap: 5px; z-index: 10;
  }
  .main.edit-mode .bm-card:hover .bm-actions { display: flex; } /* 仅在编辑模式且悬停时显示 */
  
  .bm-actions span {
    background: rgba(0,0,0,0.45); backdrop-filter: blur(6px);
    border-radius: 8px; width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center; font-size: 14px; color: #fff;
    transition: background 0.2s;
  }
  .bm-actions span:hover { background: rgba(0,0,0,0.7); }
  
  .fav-badge {
    position: absolute; top: 8px; left: 10px; color: #ffd24f; font-size: 16px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4)); display: flex; z-index: 10;
  }
  .empty-tip { text-align: center; color: var(--text-dim); margin-top: 60px; font-size: 14px; }

  /* -------- Modal -------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(5,6,10,0.55); backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .overlay.show { display: flex; }
  .modal {
    background: rgba(24, 26, 34, 0.75); border: 1px solid var(--glass-border);
    backdrop-filter: blur(30px) saturate(160%); border-radius: var(--radius-lg);
    padding: 30px 32px; width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(14px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal h3 { margin: 0 0 20px; font-size: 18px; font-weight: 600; }
  .modal label { font-size: 12.5px; color: var(--text-dim); display: block; margin: 12px 0 5px; }
  .modal input, .modal textarea {
    width: 100%; background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border);
    border-radius: 10px; color: var(--text); padding: 10px 12px; font-size: 14px; outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal .row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  .modal .btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  
  .modal .btns button {
    border: none; border-radius: 50%; width: 40px; height: 40px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 20px; transition: transform 0.1s;
  }
  .modal .btns button:active { transform: scale(0.92); }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 16px var(--accent-glow); }
  .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); }
  .btn-danger { background: linear-gradient(135deg, #ff6b6b, #ff9472); color: #fff; box-shadow: 0 4px 16px rgba(255,107,107,0.45); }

  /* -------- Toast -------- */
  #toastWrap {
    position: fixed; top: 28px; right: 28px; display: flex; flex-direction: column; gap: 12px; z-index: 200;
  }
  .toast {
    min-width: 240px; max-width: 340px; background: rgba(28, 30, 40, 0.85);
    border: 1px solid var(--glass-border); backdrop-filter: blur(26px) saturate(160%);
    border-radius: 14px; padding: 14px 18px; box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    display: flex; align-items: flex-start; gap: 10px; font-size: 13.5px; color: var(--text);
    animation: toastIn 0.28s ease; border-left: 3px solid var(--accent);
  }
  .toast.success { border-left-color: #5ee6a0; }
  .toast.error { border-left-color: var(--danger); }
  .toast .t-icon { font-size: 18px; margin-top: 1px; display: flex; }
  .toast .t-msg { flex: 1; line-height: 1.4; }
  .toast.hide { animation: toastOut 0.25s ease forwards; }
  @keyframes toastIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(30px); } }
</style>
</head>
<body>

<div id="bg"></div>
<div id="bg-overlay"></div>
<div id="toastWrap"></div>

<div class="layout">
  <div class="sidebar">
    <h2>分类</h2>
    <div id="catList"></div>
  </div>

  <div class="main" id="mainArea">
    <div class="topbar">
      <div class="search-shell">
        <div class="custom-select" id="engineSelect">
          <div class="cs-trigger" id="csTrigger">
            <span id="csLabel">谷歌</span>
            <span class="iconify arrow" data-icon="lucide:chevron-down"></span>
          </div>
          <div class="cs-options" id="csOptions">
            <div class="cs-option selected" data-value="google">谷歌</div>
            <div class="cs-option" data-value="bing">必应</div>
            <div class="cs-option" data-value="douban">豆瓣</div>
            <div class="cs-option" data-value="zhihu">知乎</div>
            <div class="cs-option" data-value="bilibili">B站</div>
            <div class="cs-option" data-value="youtube">油管</div>
          </div>
        </div>
        <div class="suggest-wrap">
          <input id="query" type="text" placeholder="搜索..." autofocus autocomplete="off" />
          <div class="suggest-list" id="suggestList"></div>
        </div>
        <button id="go"><span class="iconify" data-icon="lucide:search"></span></button>
      </div>
      
      <div class="top-actions">
        <button class="icon-btn" id="refreshBg" title="换一张壁纸"><span class="iconify" data-icon="lucide:refresh-cw"></span></button>
        <button class="icon-btn" id="addBtn" title="添加书签"><span class="iconify" data-icon="lucide:plus"></span></button>
        <button class="icon-btn" id="settingsBtn" title="设置 / 编辑模式"><span class="iconify" data-icon="lucide:settings"></span></button>
      </div>
    </div>

    <div class="toolbar">
      <div class="bm-search-shell">
        <span class="iconify bm-search-icon" data-icon="lucide:search"></span>
        <input id="bmSearch" type="text" placeholder="在当前分类中搜索书签..." />
        <span class="iconify bm-search-clear" id="bmSearchClear" data-icon="lucide:x" style="display:none;"></span>
      </div>
      <div id="clock" class="clock"></div>
    </div>

    <div class="content-scroll" id="contentScroll">
      <div id="sectionTitle" class="section-title">★ 收藏</div>
      <div class="grid" id="grid"></div>
      <div class="empty-tip" id="emptyTip" style="display:none;">暂无书签，点击右上角添加</div>
    </div>
  </div>
</div>

<div class="overlay" id="pwOverlay">
  <div class="modal">
    <h3>请输入密码</h3>
    <label>管理密码</label>
    <input type="password" id="pwInput" placeholder="输入密码" />
    <div class="btns">
      <button class="btn-secondary" id="pwCancel"><span class="iconify" data-icon="lucide:x"></span></button>
      <button class="btn-primary" id="pwConfirm"><span class="iconify" data-icon="lucide:check"></span></button>
    </div>
  </div>
</div>

<div class="overlay" id="editOverlay">
  <div class="modal">
    <h3 id="editTitle">添加书签</h3>
    <label>标题</label>
    <input id="f-title" type="text" />
    <label>URL</label>
    <input id="f-url" type="text" placeholder="https://" />
    <label>分类</label>
    <input id="f-category" type="text" />
    <label>标签（逗号分隔）</label>
    <input id="f-tags" type="text" />
    <label>描述</label>
    <input id="f-desc" type="text" />
    <div class="row">
      <input type="checkbox" id="f-fav" style="width:auto;" />
      <label style="margin:0;">收藏</label>
    </div>
    <div class="btns">
      <button class="btn-secondary" id="editCancel"><span class="iconify" data-icon="lucide:x"></span></button>
      <button class="btn-primary" id="editSave"><span class="iconify" data-icon="lucide:check"></span></button>
    </div>
  </div>
</div>

<div class="overlay" id="delOverlay">
  <div class="modal">
    <h3>确定删除吗？</h3>
    <p style="color:var(--text-dim); font-size:13.5px; margin:0;">此操作无法撤销，删除后该书签会永久移除。</p>
    <div class="btns">
      <button class="btn-secondary" id="delCancel"><span class="iconify" data-icon="lucide:x"></span></button>
      <button class="btn-danger" id="delConfirm"><span class="iconify" data-icon="lucide:trash-2"></span></button>
    </div>
  </div>
</div>

<script>
/* ====== 配置 ====== */
const API_BASE = "https://mrksss.199105.xyz";
const TOKEN_KEY = "bm_auth_token";
const TOKEN_EXP_KEY = "bm_auth_token_exp";
const TOKEN_TTL_MS = 365 * 24 * 60 * 60 * 1000;
const WALLPAPER_CACHE_KEY = "bm_wallpaper_url";
const WALLPAPER_CACHE_TIME_KEY = "bm_wallpaper_time";
const WALLPAPER_REFRESH_MS = 30 * 60 * 1000;

const SEARCH_ENGINES = {
  google:   q => `https://www.google.com/search?q=${encodeURIComponent(q)}`,
  bing:     q => `https://www.bing.com/search?q=${encodeURIComponent(q)}`,
  douban:   q => `https://www.douban.com/search?q=${encodeURIComponent(q)}`,
  zhihu:    q => `https://www.zhihu.com/search?type=content&q=${encodeURIComponent(q)}`,
  bilibili: q => `https://search.bilibili.com/all?keyword=${encodeURIComponent(q)}`,
  youtube:  q => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`,
};

/* ---------- 北京时间时钟 (YYYY-MM-DD HH:mm:ss) ---------- */
function updateClock() {
  const now = new Date();
  const year = now.getFullYear();
  const month = String(now.getMonth() + 1).padStart(2, '0');
  const day = String(now.getDate()).padStart(2, '0');
  const hours = String(now.getHours()).padStart(2, '0');
  const minutes = String(now.getMinutes()).padStart(2, '0');
  const seconds = String(now.getSeconds()).padStart(2, '0');
  document.getElementById('clock').textContent = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
}
setInterval(updateClock, 1000);
updateClock();

/* ---------- Toast 通知 ---------- */
function showToast(msg, type = "info") {
  const wrap = document.getElementById("toastWrap");
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  const icon = type === "success" ? "lucide:check-circle" : type === "error" ? "lucide:x-circle" : "lucide:info";
  el.innerHTML = `<span class="iconify t-icon" data-icon="${icon}"></span><span class="t-msg">${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => {
    el.classList.add("hide");
    setTimeout(() => el.remove(), 260);
  }, 3200);
}

/* ---------- 自定义下拉 ---------- */
const engineSelect = document.getElementById("engineSelect");
const csTrigger = document.getElementById("csTrigger");
const csLabel = document.getElementById("csLabel");
const csOptions = document.getElementById("csOptions");
let currentEngine = "google";

csTrigger.addEventListener("click", (e) => {
  e.stopPropagation();
  engineSelect.classList.toggle("open");
});
csOptions.querySelectorAll(".cs-option").forEach(opt => {
  opt.addEventListener("click", () => {
    currentEngine = opt.dataset.value;
    csLabel.textContent = opt.textContent;
    csOptions.querySelectorAll(".cs-option").forEach(o => o.classList.remove("selected"));
    opt.classList.add("selected");
    engineSelect.classList.remove("open");
    if (typeof hideSuggest === "function") hideSuggest();
  });
});
document.addEventListener("click", () => engineSelect.classList.remove("open"));

function favicon(url) {
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?sz=64&domain=${u.hostname}`;
  } catch (e) { return ""; }
}

/* ---------- 随机动漫壁纸 ---------- */
async function fetchRandomWallpaper() {
  try {
    const res = await fetch(API_BASE + "/api/wallpaper");
    const data = await res.json();
    if (!data.ok || !data.proxyUrl) throw new Error("no url");
    return API_BASE + data.proxyUrl;
  } catch (e) {
    return "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?q=80&w=1920";
  }
}
async function setWallpaper(force = false) {
  const bg = document.getElementById("bg");
  const cachedUrl = localStorage.getItem(WALLPAPER_CACHE_KEY);
  const cachedTime = parseInt(localStorage.getItem(WALLPAPER_CACHE_TIME_KEY) || "0", 10);
  if (!force && cachedUrl && Date.now() - cachedTime < WALLPAPER_REFRESH_MS) {
    bg.style.backgroundImage = `url("${cachedUrl}")`;
    return;
  }
  const url = await fetchRandomWallpaper();
  localStorage.setItem(WALLPAPER_CACHE_KEY, url);
  localStorage.setItem(WALLPAPER_CACHE_TIME_KEY, String(Date.now()));
  const img = new Image();
  img.onload = () => { bg.style.opacity = 0; setTimeout(() => { bg.style.backgroundImage = `url("${url}")`; bg.style.opacity = 1; }, 200); };
  img.src = url;
}
document.getElementById("refreshBg").onclick = () => setWallpaper(true);

/* ---------- Token ---------- */
function getToken() {
  const exp = parseInt(localStorage.getItem(TOKEN_EXP_KEY) || "0", 10);
  if (Date.now() > exp) {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(TOKEN_EXP_KEY);
    return null;
  }
  return localStorage.getItem(TOKEN_KEY);
}
function setToken(token) {
  localStorage.setItem(TOKEN_KEY, token);
  localStorage.setItem(TOKEN_EXP_KEY, String(Date.now() + TOKEN_TTL_MS));
}
async function authFetch(path, options = {}) {
  const token = getToken();
  options.headers = Object.assign({}, options.headers, {
    "Content-Type": "application/json",
    ...(token ? { Authorization: `Bearer ${token}` } : {}),
  });
  return fetch(API_BASE + path, options);
}

/* ---------- 密码流程 ---------- */
let pendingAction = null;
function requirePassword(action) {
  if (getToken()) { action(); return; }
  pendingAction = action;
  document.getElementById("pwInput").value = "";
  document.getElementById("pwOverlay").classList.add("show");
}
document.getElementById("pwCancel").onclick = () => {
  document.getElementById("pwOverlay").classList.remove("show");
  pendingAction = null;
};
document.getElementById("pwConfirm").onclick = async () => {
  const pw = document.getElementById("pwInput").value;
  try {
    const res = await fetch(API_BASE + "/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    const data = await res.json();
    if (data.ok) {
      setToken(data.token);
      document.getElementById("pwOverlay").classList.remove("show");
      showToast("验证成功，365 天内免密操作", "success");
      if (pendingAction) pendingAction();
      pendingAction = null;
    } else {
      showToast("密码错误，请重新输入", "error");
    }
  } catch (e) {
    showToast("网络错误，请检查后重试", "error");
  }
};

/* ---------- 设置/编辑模式 ---------- */
let isEditMode = false;
document.getElementById("settingsBtn").addEventListener("click", () => {
  requirePassword(() => {
    isEditMode = !isEditMode;
    document.getElementById("mainArea").classList.toggle("edit-mode", isEditMode);
    document.getElementById("settingsBtn").classList.toggle("active", isEditMode);
    showToast(isEditMode ? "已开启编辑模式" : "已关闭编辑模式", "success");
  });
});

/* ---------- 搜索 + 搜索提示 ---------- */
const queryInput = document.getElementById("query");
const suggestList = document.getElementById("suggestList");
let suggestTimer = null;
let suggestItems = [];
let highlightIndex = -1;

document.getElementById("go").onclick = () => doSearch();

function doSearch(text) {
  const q = (text !== undefined ? text : queryInput.value).trim();
  if (!q) { showToast("请输入搜索内容"); return; }
  hideSuggest();
  window.open(SEARCH_ENGINES[currentEngine](q), "_blank");
}

async function fetchSuggestions(q) {
  try {
    const res = await fetch(`${API_BASE}/api/suggest?engine=${currentEngine}&q=${encodeURIComponent(q)}`);
    const data = await res.json();
    return data.ok ? (data.suggestions || []) : [];
  } catch (e) { return []; }
}

function renderSuggest(list) {
  suggestItems = list;
  highlightIndex = -1;
  if (!list.length) { hideSuggest(); return; }
  suggestList.innerHTML = list
    .map((s, i) => `<div class="suggest-item" data-idx="${i}"><span class="iconify s-icon" data-icon="lucide:search"></span><span>${escapeHtml(s)}</span></div>`)
    .join("");
  suggestList.querySelectorAll(".suggest-item").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.idx, 10);
      queryInput.value = suggestItems[idx];
      doSearch(suggestItems[idx]);
    });
  });
  suggestList.classList.add("show");
}

function hideSuggest() {
  suggestList.classList.remove("show");
  suggestItems = [];
  highlightIndex = -1;
}

function updateHighlight() {
  suggestList.querySelectorAll(".suggest-item").forEach((el, i) => {
    el.classList.toggle("highlight", i === highlightIndex);
  });
}

queryInput.addEventListener("input", () => {
  const q = queryInput.value.trim();
  clearTimeout(suggestTimer);
  if (!q) { hideSuggest(); return; }
  suggestTimer = setTimeout(async () => {
    const list = await fetchSuggestions(q);
    renderSuggest(list);
  }, 220);
});

queryInput.addEventListener("keydown", e => {
  if (suggestItems.length && suggestList.classList.contains("show")) {
    if (e.key === "ArrowDown") { e.preventDefault(); highlightIndex = (highlightIndex + 1) % suggestItems.length; updateHighlight(); return; }
    if (e.key === "ArrowUp") { e.preventDefault(); highlightIndex = (highlightIndex - 1 + suggestItems.length) % suggestItems.length; updateHighlight(); return; }
    if (e.key === "Escape") { hideSuggest(); return; }
  }
  if (e.key === "Enter") {
    if (highlightIndex >= 0 && suggestItems[highlightIndex]) {
      queryInput.value = suggestItems[highlightIndex]; doSearch(suggestItems[highlightIndex]);
    } else { doSearch(); }
  }
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".suggest-wrap")) hideSuggest();
});

/* ---------- 书签数据 + 分类 ---------- */
let bookmarks = [];
let activeCategory = "__fav__"; 
let searchKeyword = "";

async function loadBookmarks() {
  try {
    const res = await fetch(API_BASE + "/api/bookmarks");
    const data = await res.json();
    bookmarks = data.ok ? data.data : [];
  } catch (e) {
    bookmarks = [];
    showToast("加载书签失败，请检查网络或接口地址", "error");
  }
  renderSidebar();
  renderGrid();
}

function getCategoryCounts() {
  const map = {};
  bookmarks.forEach(bm => {
    const cat = bm.category || "未分类";
    map[cat] = (map[cat] || 0) + 1;
  });
  return map;
}

function renderSidebar() {
  const counts = getCategoryCounts();
  const catList = document.getElementById("catList");
  const cats = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
  let html = `<div class="cat-item ${activeCategory === '__all__' ? 'active' : ''}" data-cat="__all__">
      <div class="cat-item-left"><span class="iconify" data-icon="lucide:layout-grid"></span><span>全部</span></div><span class="cat-count">${bookmarks.length}</span></div>`;
  html += `<div class="cat-item ${activeCategory === '__fav__' ? 'active' : ''}" data-cat="__fav__">
      <div class="cat-item-left"><span class="iconify" data-icon="lucide:star"></span><span>收藏</span></div><span class="cat-count">${bookmarks.filter(b=>b.favorite).length}</span></div>`;
  cats.forEach(cat => {
    html += `<div class="cat-item ${activeCategory === cat ? 'active' : ''}" data-cat="${escapeHtml(cat)}">
        <div class="cat-item-left"><span class="iconify" data-icon="lucide:folder"></span><span>${escapeHtml(cat)}</span></div><span class="cat-count">${counts[cat]}</span></div>`;
  });
  catList.innerHTML = html;
  catList.querySelectorAll(".cat-item").forEach(el => {
    el.addEventListener("click", () => {
      activeCategory = el.dataset.cat;
      renderSidebar();
      renderGrid();
      // 核心修复：只滚动独立的内容区域
      document.getElementById("contentScroll").scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function renderGrid() {
  const grid = document.getElementById("grid");
  const sectionTitle = document.getElementById("sectionTitle");
  let list = bookmarks;
  let baseTitle = "全部书签";
  if (activeCategory === "__fav__") {
    list = bookmarks.filter(b => b.favorite);
    baseTitle = "★ 收藏";
  } else if (activeCategory !== "__all__") {
    list = bookmarks.filter(b => (b.category || "未分类") === activeCategory);
    baseTitle = activeCategory;
  }

  const kw = searchKeyword.trim().toLowerCase();
  if (kw) {
    list = list.filter(b => {
      const title = (b.title || "").toLowerCase();
      const desc = (b.desc || "").toLowerCase();
      const tags = (b.tags || []).join(",").toLowerCase();
      return title.includes(kw) || desc.includes(kw) || tags.includes(kw);
    });
    sectionTitle.textContent = `${baseTitle} · 搜索"${searchKeyword.trim()}"（${list.length} 条）`;
  } else {
    sectionTitle.textContent = baseTitle;
  }

  grid.innerHTML = "";
  document.getElementById("emptyTip").style.display = list.length ? "none" : "block";
  list
    .slice()
    .sort((a, b) => (b.favorite - a.favorite))
    .forEach(bm => {
      const card = document.createElement("a");
      card.className = "bm-card";
      card.href = bm.url;
      card.target = "_blank";
      card.innerHTML = `
        ${bm.favorite ? '<span class="iconify fav-badge" data-icon="lucide:star" style="fill: currentColor;"></span>' : ""}
        <span class="bm-actions">
          <span data-act="edit"><span class="iconify" data-icon="lucide:edit-2"></span></span>
          <span data-act="del"><span class="iconify" data-icon="lucide:trash-2"></span></span>
        </span>
        <div class="bm-icon"><img src="${favicon(bm.url)}" onerror="this.style.display='none'"/></div>
        <div class="bm-title">${escapeHtml(bm.title || bm.url)}</div>
      `;
      card.querySelector('[data-act="edit"]').addEventListener("click", ev => {
        ev.preventDefault(); ev.stopPropagation();
        openEditModal(bm); 
      });
      card.querySelector('[data-act="del"]').addEventListener("click", ev => {
        ev.preventDefault(); ev.stopPropagation();
        openDeleteModal(bm.id); 
      });
      grid.appendChild(card);
    });
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

/* ---------- 增/改 弹窗 ---------- */
const editOverlay = document.getElementById("editOverlay");
let editingId = null;

function openEditModal(bm) {
  editingId = bm ? bm.id : null;
  document.getElementById("editTitle").textContent = bm ? "编辑书签" : "添加书签";
  document.getElementById("f-title").value = bm ? bm.title : "";
  document.getElementById("f-url").value = bm ? bm.url : "";
  document.getElementById("f-category").value = bm ? bm.category : "";
  document.getElementById("f-tags").value = bm ? (bm.tags || []).join(",") : "";
  document.getElementById("f-desc").value = bm ? bm.desc : "";
  document.getElementById("f-fav").checked = bm ? !!bm.favorite : false;
  editOverlay.classList.add("show");
}
document.getElementById("addBtn").onclick = () => requirePassword(() => openEditModal(null));
document.getElementById("editCancel").onclick = () => editOverlay.classList.remove("show");

document.getElementById("editSave").onclick = async () => {
  const payload = {
    title: document.getElementById("f-title").value.trim(),
    url: document.getElementById("f-url").value.trim(),
    category: document.getElementById("f-category").value.trim() || "未分类",
    tags: document.getElementById("f-tags").value.split(",").map(s => s.trim()).filter(Boolean),
    desc: document.getElementById("f-desc").value.trim(),
    favorite: document.getElementById("f-fav").checked,
  };
  if (!payload.url) { showToast("URL 不能为空", "error"); return; }

  try {
    if (editingId) {
      await authFetch(`/api/bookmarks/${editingId}`, { method: "PUT", body: JSON.stringify(payload) });
      showToast("修改成功", "success");
    } else {
      await authFetch(`/api/bookmarks`, { method: "POST", body: JSON.stringify(payload) });
      showToast("添加成功", "success");
    }
    editOverlay.classList.remove("show");
    await loadBookmarks();
  } catch (e) {
    showToast("操作失败，请重试", "error");
  }
};

/* ---------- 删除弹窗 ---------- */
const delOverlay = document.getElementById("delOverlay");
let deletingId = null;

function openDeleteModal(id) {
  deletingId = id;
  delOverlay.classList.add("show");
}
document.getElementById("delCancel").onclick = () => { delOverlay.classList.remove("show"); deletingId = null; };
document.getElementById("delConfirm").onclick = async () => {
  if (!deletingId) return;
  try {
    await authFetch(`/api/bookmarks/${deletingId}`, { method: "DELETE" });
    showToast("已删除", "success");
    delOverlay.classList.remove("show");
    await loadBookmarks();
  } catch (e) {
    showToast("删除失败，请重试", "error");
  }
};

const bmSearchInput = document.getElementById("bmSearch");
const bmSearchClear = document.getElementById("bmSearchClear");
bmSearchInput.addEventListener("input", () => {
  searchKeyword = bmSearchInput.value;
  bmSearchClear.style.display = searchKeyword ? "flex" : "none";
  renderGrid();
});
bmSearchClear.addEventListener("click", () => {
  bmSearchInput.value = "";
  searchKeyword = "";
  bmSearchClear.style.display = "none";
  renderGrid();
  bmSearchInput.focus();
});

setWallpaper();
loadBookmarks();
</script>
