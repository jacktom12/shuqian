<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>我的书签</title>
<style>
  :root {
    --glass-bg: rgba(255, 255, 255, 0.08);
    --glass-bg-strong: rgba(255, 255, 255, 0.14);
    --glass-border: rgba(255, 255, 255, 0.18);
    --text: #f2f3f7;
    --text-dim: rgba(242, 243, 247, 0.6);
    --accent: #7aa2ff;
    --accent2: #a58bff;
    --accent-glow: rgba(122, 162, 255, 0.55);
    --radius-lg: 26px;
    --radius-md: 18px;
    --radius-sm: 12px;
    --danger: #ff6b6b;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    height: 100%;
    font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
    color: var(--text);
    overflow-x: hidden;
  }
  #bg {
    position: fixed; inset: 0; z-index: -2;
    background-size: cover; background-position: center;
    filter: brightness(0.55) saturate(1.1);
    transition: opacity 0.6s ease;
  }
  #bg-overlay {
    position: fixed; inset: 0; z-index: -1;
    background: linear-gradient(160deg, rgba(10,12,20,0.35) 0%, rgba(10,12,20,0.65) 100%);
  }
  .layout {
    display: flex;
    min-height: 100vh;
    padding: 32px;
    gap: 28px;
  }
  /* -------- Sidebar -------- */
  .sidebar {
    width: 230px;
    flex-shrink: 0;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(22px) saturate(140%);
    -webkit-backdrop-filter: blur(22px) saturate(140%);
    border-radius: var(--radius-lg);
    padding: 26px 18px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    height: calc(100vh - 64px);
    position: sticky;
    top: 32px;
    overflow-y: auto;
  }
  .sidebar::-webkit-scrollbar { width: 0; height: 0; display: none; }
  .sidebar { scrollbar-width: none; -ms-overflow-style: none; }
  .sidebar h2 {
    font-size: 15px; font-weight: 600; margin: 0 0 18px 6px;
    color: var(--text); letter-spacing: 0.5px;
  }
  .cat-item {
    display: flex; justify-content: space-between; align-items: center;
    padding: 11px 14px; margin-bottom: 4px;
    border-radius: var(--radius-sm); cursor: pointer;
    font-size: 14px; color: var(--text-dim);
    transition: all 0.2s ease;
  }
  .cat-item:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .cat-item.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    box-shadow: 0 4px 18px var(--accent-glow);
  }
  .cat-count {
    font-size: 11px; opacity: 0.75;
    background: rgba(255,255,255,0.12);
    padding: 1px 8px; border-radius: 10px;
  }
  .cat-item.active .cat-count { background: rgba(255,255,255,0.25); }

  /* -------- Main -------- */
  .main { flex: 1; min-width: 0; }

  .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 34px; position: relative; z-index: 60; }

  .search-shell {
    flex: 1; display: flex; align-items: center;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(24px) saturate(150%);
    -webkit-backdrop-filter: blur(24px) saturate(150%);
    border-radius: 999px;
    padding: 6px 8px 6px 8px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.25);
    position: relative;
    z-index: 60;
  }

  /* ---- 自定义下拉（替代原生 select） ---- */
  .custom-select {
    position: relative;
    flex-shrink: 0;
  }
  .cs-trigger {
    display: flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14.5px;
    color: var(--text);
    user-select: none;
    transition: background 0.2s;
    white-space: nowrap;
  }
  .cs-trigger:hover { background: rgba(255,255,255,0.08); }
  .cs-trigger .arrow { font-size: 10px; opacity: 0.6; transition: transform 0.2s; }
  .custom-select.open .cs-trigger .arrow { transform: rotate(180deg); }
  .cs-options {
    position: absolute;
    top: calc(100% + 10px);
    left: 0;
    min-width: 130px;
    background: rgba(28, 30, 40, 0.85);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(26px) saturate(160%);
    -webkit-backdrop-filter: blur(26px) saturate(160%);
    border-radius: 16px;
    padding: 8px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.4);
    opacity: 0;
    transform: translateY(-8px);
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
    z-index: 500;
  }
  .custom-select.open .cs-options {
    opacity: 1; transform: translateY(0); pointer-events: auto;
  }
  .cs-option {
    padding: 9px 14px;
    border-radius: 10px;
    font-size: 14px;
    cursor: pointer;
    color: var(--text-dim);
    transition: background 0.15s, color 0.15s;
  }
  .cs-option:hover { background: rgba(255,255,255,0.1); color: var(--text); }
  .cs-option.selected { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; }

  .search-shell input {
    flex: 1; background: transparent; border: none; outline: none;
    color: var(--text); font-size: 16px; padding: 12px 6px;
  }
  .search-shell input::placeholder { color: var(--text-dim); }

  .suggest-wrap { position: relative; flex: 1; }
  .suggest-list {
    position: absolute;
    top: calc(100% + 12px);
    left: 0;
    right: 0;
    background: rgba(28, 30, 40, 0.88);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(28px) saturate(160%);
    -webkit-backdrop-filter: blur(28px) saturate(160%);
    border-radius: 16px;
    padding: 6px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.45);
    opacity: 0;
    transform: translateY(-8px);
    pointer-events: none;
    transition: opacity 0.16s ease, transform 0.16s ease;
    z-index: 400;
    max-height: 320px;
    overflow-y: auto;
  }
  .suggest-list.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .suggest-item {
    padding: 10px 14px;
    border-radius: 10px;
    font-size: 14px;
    color: var(--text-dim);
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: background 0.14s, color 0.14s;
  }
  .suggest-item .s-icon { font-size: 13px; opacity: 0.5; flex-shrink: 0; }
  .suggest-item:hover, .suggest-item.highlight { background: rgba(255,255,255,0.1); color: var(--text); }
  .search-shell button {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; border: none; border-radius: 999px;
    padding: 11px 26px; cursor: pointer; font-size: 14.5px; font-weight: 500;
    box-shadow: 0 4px 16px var(--accent-glow);
    transition: transform 0.15s;
  }
  .search-shell button:hover { transform: translateY(-1px); }

  .icon-btn {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(24px);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px; flex-shrink: 0;
    transition: background 0.2s, transform 0.2s;
  }
  .icon-btn:hover { background: var(--glass-bg-strong); transform: rotate(15deg); }

  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; color: #fff; border-radius: 999px;
    padding: 13px 24px; font-size: 14.5px; font-weight: 500;
    cursor: pointer; box-shadow: 0 4px 16px var(--accent-glow);
    flex-shrink: 0; white-space: nowrap;
  }

  .bm-search-shell {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(20px) saturate(140%);
    -webkit-backdrop-filter: blur(20px) saturate(140%);
    border-radius: 16px;
    padding: 10px 16px;
    margin-bottom: 22px;
    max-width: 460px;
  }
  .bm-search-icon { font-size: 16px; color: var(--text-dim); flex-shrink: 0; }
  .bm-search-shell input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 14px;
  }
  .bm-search-shell input::placeholder { color: var(--text-dim); }
  .bm-search-clear {
    cursor: pointer;
    color: var(--text-dim);
    font-size: 13px;
    padding: 2px 6px;
    border-radius: 6px;
    transition: background 0.15s, color 0.15s;
  }
  .bm-search-clear:hover { background: rgba(255,255,255,0.1); color: var(--text); }

  .section-title {
    font-size: 13px; color: var(--text-dim); letter-spacing: 1px;
    margin: 0 0 16px 4px; text-transform: uppercase;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(128px, 1fr));
    gap: 18px;
    margin-bottom: 38px;
    position: relative;
    z-index: 1;
  }
  .bm-card {
    position: relative;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border-radius: var(--radius-md);
    padding: 20px 10px 14px;
    display: flex; flex-direction: column; align-items: center; text-align: center;
    cursor: pointer;
    transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
    text-decoration: none; color: var(--text);
  }
  .bm-card:hover {
    transform: translateY(-5px);
    background: var(--glass-bg-strong);
    box-shadow: 0 12px 28px rgba(0,0,0,0.3);
  }
  .bm-icon {
    width: 52px; height: 52px; border-radius: 50%;
    background: rgba(255,255,255,0.92);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden; margin-bottom: 10px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.25);
  }
  .bm-icon img { width: 30px; height: 30px; object-fit: contain; }
  .bm-title {
    font-size: 12.5px; line-height: 1.35; max-width: 106px;
    overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }
  .bm-actions {
    position: absolute; top: 8px; right: 8px; display: none; gap: 5px;
  }
  .bm-card:hover .bm-actions { display: flex; }
  .bm-actions span {
    background: rgba(0,0,0,0.45); backdrop-filter: blur(6px);
    border-radius: 8px; width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center; font-size: 12px;
  }
  .fav-badge {
    position: absolute; top: 8px; left: 10px; color: #ffd24f; font-size: 13px;
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
  }
  .empty-tip { text-align: center; color: var(--text-dim); margin-top: 60px; font-size: 14px; }

  /* -------- Modal -------- */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(5,6,10,0.55);
    backdrop-filter: blur(6px);
    display: none; align-items: center; justify-content: center; z-index: 100;
  }
  .overlay.show { display: flex; }
  .modal {
    background: rgba(24, 26, 34, 0.75);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(30px) saturate(160%);
    -webkit-backdrop-filter: blur(30px) saturate(160%);
    border-radius: var(--radius-lg);
    padding: 30px 32px;
    width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    animation: modalIn 0.25s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: translateY(14px) scale(0.97); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .modal h3 { margin: 0 0 20px; font-size: 18px; font-weight: 600; }
  .modal label { font-size: 12.5px; color: var(--text-dim); display: block; margin: 12px 0 5px; }
  .modal input, .modal textarea {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--glass-border);
    border-radius: 10px;
    color: var(--text);
    padding: 10px 12px;
    font-size: 14px;
    outline: none;
  }
  .modal input:focus { border-color: var(--accent); }
  .modal .row { display: flex; align-items: center; gap: 8px; margin-top: 14px; }
  .modal .btns { display: flex; justify-content: flex-end; gap: 10px; margin-top: 24px; }
  .modal .btns button {
    border: none; border-radius: 10px; padding: 9px 20px; cursor: pointer; font-size: 14px; font-weight: 500;
  }
  .btn-primary { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #fff; box-shadow: 0 4px 16px var(--accent-glow); }
  .btn-secondary { background: rgba(255,255,255,0.08); color: var(--text); }
  .btn-danger { background: linear-gradient(135deg, #ff6b6b, #ff9472); color: #fff; box-shadow: 0 4px 16px rgba(255,107,107,0.45); }

  /* -------- Toast -------- */
  #toastWrap {
    position: fixed;
    top: 28px;
    right: 28px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    z-index: 200;
  }
  .toast {
    min-width: 240px;
    max-width: 340px;
    background: rgba(28, 30, 40, 0.85);
    border: 1px solid var(--glass-border);
    backdrop-filter: blur(26px) saturate(160%);
    -webkit-backdrop-filter: blur(26px) saturate(160%);
    border-radius: 14px;
    padding: 14px 18px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.4);
    display: flex;
    align-items: flex-start;
    gap: 10px;
    font-size: 13.5px;
    color: var(--text);
    animation: toastIn 0.28s ease;
    border-left: 3px solid var(--accent);
  }
  .toast.success { border-left-color: #5ee6a0; }
  .toast.error { border-left-color: var(--danger); }
  .toast .t-icon { font-size: 15px; margin-top: 1px; }
  .toast .t-msg { flex: 1; line-height: 1.4; }
  .toast.hide { animation: toastOut 0.25s ease forwards; }
  @keyframes toastIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(30px); } }


:root {
  --sidebar-w: 190px;
}

html, body {
  height: 100%;
  overflow: hidden;
}

.layout {
  height: 100vh;
  overflow: hidden;
  align-items: flex-start;
}

.sidebar {
  width: var(--sidebar-w) !important;
  min-width: var(--sidebar-w);
}

.main {
  flex: 1;
  height: calc(100vh - 64px);
  overflow-y: auto;
  overflow-x: hidden;
  padding-right: 2px;
  scrollbar-width: none;
  -ms-overflow-style: none;
}

.main::-webkit-scrollbar {
  width: 0;
  height: 0;
  display: none;
}

.toolbar-sticky {
  position: sticky;
  top: 0;
  z-index: 80;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
  padding: 8px 0 14px;
  margin-bottom: 18px;
  backdrop-filter: blur(18px);
  background: linear-gradient(180deg, rgba(10,12,18,0.94) 0%, rgba(10,12,18,0.78) 70%, rgba(10,12,18,0) 100%);
}

.topbar { margin-bottom: 0; }

.search-shell {
  flex: 0 0 360px;
  max-width: 360px;
}

.bm-search-shell {
  flex: 0 0 300px;
  max-width: 300px;
  margin: 0;
}

.search-shell input,
.bm-search-shell input {
  font-size: 14px;
}

.search-shell button,
.icon-btn,
.add-btn,
.settings-btn {
  width: 46px;
  height: 46px;
  min-width: 46px;
  padding: 0;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.search-shell button .iconify,
.icon-btn .iconify,
.add-btn .iconify,
.settings-btn .iconify,
.bm-search-icon .iconify,
.bm-search-clear .iconify,
.cs-trigger .iconify {
  font-size: 20px;
}

.search-shell button {
  border: none;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  color: #fff;
  border-radius: 14px;
}

.icon-btn,
.add-btn,
.settings-btn {
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  color: var(--text);
  font-size: 0;
}

.icon-btn:hover,
.add-btn:hover,
.settings-btn:hover,
.search-shell button:hover {
  transform: translateY(-1px);
}

.date-card {
  min-width: 218px;
  height: 46px;
  padding: 0 14px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-radius: 16px;
  background: var(--glass-bg);
  border: 1px solid var(--glass-border);
  box-shadow: 0 8px 32px rgba(0,0,0,0.22);
}

.date-main {
  font-size: 13px;
  color: var(--text-dim);
  line-height: 1.15;
}

.date-sub {
  font-size: 16px;
  font-weight: 600;
  line-height: 1.2;
}

.section-title {
  margin-top: 4px;
}

.bm-icon {
  width: 52px;
  height: 52px;
  border-radius: 14px !important;
  background: rgba(255,255,255,0.92);
}

.bm-card {
  position: relative;
}

.bm-actions {
  position: absolute;
  top: 12px;
  right: 12px;
  display: flex;
  gap: 8px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.18s ease;
}

body.manage-mode .bm-actions {
  opacity: 1;
  pointer-events: auto;
}

.mini-manage-btn {
  width: 30px;
  height: 30px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 10px;
  background: rgba(255,255,255,0.06);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  backdrop-filter: blur(10px);
}

.mini-manage-btn:hover {
  background: rgba(255,255,255,0.12);
}

.mini-manage-btn .iconify {
  font-size: 16px;
}

@media (max-width: 1180px) {
  .search-shell {
    flex-basis: 320px;
    max-width: 320px;
  }

  .bm-search-shell {
    flex-basis: 260px;
    max-width: 260px;
  }

  .date-card {
    min-width: 186px;
  }
}

</style>
  <script src="https://code.iconify.design/3/3.1.1/iconify.min.js">

const mainScroller = document.getElementById('mainScroller') || document.querySelector('.main');
let manageMode = false;
const MANAGE_MODE_PASSWORD = '123456';
const settingsBtn = document.getElementById('settingsBtn');
const settingsOverlay = document.getElementById('settingsOverlay');
const settingsPassword = document.getElementById('settingsPassword');
const settingsCancel = document.getElementById('settingsCancel');
const settingsConfirm = document.getElementById('settingsConfirm');

function resetMainScroll() {
  requestAnimationFrame(() => {
    if (mainScroller) mainScroller.scrollTo({ top: 0, behavior: 'smooth' });
    window.scrollTo({ top: 0, behavior: 'smooth' });
    document.documentElement.scrollTop = 0;
    document.body.scrollTop = 0;
  });
}

function updateBeijingTime() {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('zh-CN', {
    timeZone: 'Asia/Shanghai',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    weekday: 'short',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  });

  const parts = formatter.formatToParts(now).reduce((acc, item) => {
    acc[item.type] = item.value;
    return acc;
  }, {});

  const main = document.getElementById('bjDateMain');
  const sub = document.getElementById('bjDateSub');

  if (main) main.textContent = `北京时间 ${parts.year}-${parts.month}-${parts.day} ${parts.weekday}`;
  if (sub) sub.textContent = `${parts.hour}:${parts.minute}:${parts.second}`;
}

updateBeijingTime();
setInterval(updateBeijingTime, 1000);

function openSettingsOverlay() {
  settingsPassword.value = '';
  settingsOverlay.classList.add('show');
  setTimeout(() => settingsPassword.focus(), 20);
}

function closeSettingsOverlay() {
  settingsOverlay.classList.remove('show');
}

settingsBtn?.addEventListener('click', openSettingsOverlay);
settingsCancel?.addEventListener('click', closeSettingsOverlay);
settingsConfirm?.addEventListener('click', () => {
  if (settingsPassword.value !== MANAGE_MODE_PASSWORD) {
    if (typeof showToast === 'function') showToast('密码错误', 'error');
    settingsPassword.focus();
    settingsPassword.select();
    return;
  }

  manageMode = !manageMode;
  document.body.classList.toggle('manage-mode', manageMode);
  closeSettingsOverlay();
  if (typeof showToast === 'function') {
    showToast(manageMode ? '已进入管理模式' : '已退出管理模式', 'success');
  }
});

settingsPassword?.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') settingsConfirm.click();
});



document.getElementById('grid')?.addEventListener('click', (e) => {
  const editBtn = e.target.closest('.js-edit');
  const deleteBtn = e.target.closest('.js-delete');
  if (!editBtn && !deleteBtn) return;

  e.preventDefault();
  e.stopPropagation();

  const id = (editBtn || deleteBtn).dataset.id;
  const item = (window.bookmarks || bookmarks || []).find(b => String(b.id) === String(id));
  if (!item) return;

  if (editBtn) {
    if (typeof openEditModal === 'function') openEditModal(item);
    else if (typeof editBookmark === 'function') editBookmark(item);
  }

  if (deleteBtn) {
    if (typeof openDeleteModal === 'function') openDeleteModal(item);
    else if (typeof confirmDelete === 'function') confirmDelete(item);
    else if (typeof deleteBookmark === 'function') deleteBookmark(item);
  }
});

</script>

<body>

<div class="layout">
  <div class="sidebar">
    <h2>分类</h2>
    <div id="catList"></div>
  </div>

  <div class="main" id="mainScroller">
    <div class="toolbar-sticky">

<div id="toastRoot"></div>
<script>
/* ====== 配置 ====== */
const API_BASE = "https://mrksss.199105.xyz";
const TOKEN_KEY = "bm_auth_token";
const TOKEN_EXP_KEY = "bm_auth_token_exp";
const TOKEN_TTL_MS = 365 * 24 * 60 * 60 * 1000;
const WALLPAPER_CACHE_KEY = "bm_wallpaper_url";
const WALLPAPER_CACHE_TIME_KEY = "bm_wallpaper_time";
const WALLPAPER_REFRESH_MS = 30 * 60 * 1000;

const SEARCH_ENGINES = {
  google:   q => `https://www.google.com/search?q=${encodeURIComponent(q)}`,
  bing:     q => `https://www.bing.com/search?q=${encodeURIComponent(q)}`,
  douban:   q => `https://www.douban.com/search?q=${encodeURIComponent(q)}`,
  zhihu:    q => `https://www.zhihu.com/search?type=content&q=${encodeURIComponent(q)}`,
  bilibili: q => `https://search.bilibili.com/all?keyword=${encodeURIComponent(q)}`,
  youtube:  q => `https://www.youtube.com/results?search_query=${encodeURIComponent(q)}`,
};

/* ---------- Toast 通知（替代 alert/confirm 的轻量提示） ---------- */
function showToast(msg, type = "info") {
  const wrap = document.getElementById("toastWrap");
  const el = document.createElement("div");
  el.className = `toast ${type}`;
  const icon = type === "success" ? "✓" : type === "error" ? "<span class="iconify" data-icon="solar:close-circle-linear"></span>" : "ℹ";
  el.innerHTML = `<span class="t-icon">${icon}</span><span class="t-msg">${msg}</span>`;
  wrap.appendChild(el);
  setTimeout(() => {
    el.classList.add("hide");
    setTimeout(() => el.remove(), 260);
  }, 3200);
}

/* ---------- 自定义下拉 ---------- */
const engineSelect = document.getElementById("engineSelect");
const csTrigger = document.getElementById("csTrigger");
const csLabel = document.getElementById("csLabel");
const csOptions = document.getElementById("csOptions");
let currentEngine = "google";

csTrigger.addEventListener("click", (e) => {
  e.stopPropagation();
  engineSelect.classList.toggle("open");
});
csOptions.querySelectorAll(".cs-option").forEach(opt => {
  opt.addEventListener("click", () => {
    currentEngine = opt.dataset.value;
    csLabel.textContent = opt.textContent;
    csOptions.querySelectorAll(".cs-option").forEach(o => o.classList.remove("selected"));
    opt.classList.add("selected");
    engineSelect.classList.remove("open");
    if (typeof hideSuggest === "function") hideSuggest();
  });
});
document.addEventListener("click", () => engineSelect.classList.remove("open"));

function favicon(url) {
  try {
    const u = new URL(url);
    return `https://www.google.com/s2/favicons?sz=64&domain=${u.hostname}`;
  } catch (e) { return ""; }
}

 /* ---------- 随机动漫壁纸 ---------- */
async function fetchRandomWallpaper() {
  try {
    const res = await fetch(API_BASE + "/api/wallpaper");
    const data = await res.json();
    if (!data.ok || !data.proxyUrl) throw new Error("no url");
    return API_BASE + data.proxyUrl;
  } catch (e) {
    return "https://images.unsplash.com/photo-1544716278-ca5e3f4abd8c?q=80&w=1920";
  }
}
async function setWallpaper(force = false) {
  const bg = document.getElementById("bg");
  const cachedUrl = localStorage.getItem(WALLPAPER_CACHE_KEY);
  const cachedTime = parseInt(localStorage.getItem(WALLPAPER_CACHE_TIME_KEY) || "0", 10);
  if (!force && cachedUrl && Date.now() - cachedTime < WALLPAPER_REFRESH_MS) {
    bg.style.backgroundImage = `url("${cachedUrl}")`;
    return;
  }
  const url = await fetchRandomWallpaper();
  localStorage.setItem(WALLPAPER_CACHE_KEY, url);
  localStorage.setItem(WALLPAPER_CACHE_TIME_KEY, String(Date.now()));
  const img = new Image();
  img.onload = () => { bg.style.opacity = 0; setTimeout(() => { bg.style.backgroundImage = `url("${url}")`; bg.style.opacity = 1; }, 200); };
  img.src = url;
}
document.getElementById("refreshBg").onclick = () => setWallpaper(true);

/* ---------- Token ---------- */
function getToken() {
  const exp = parseInt(localStorage.getItem(TOKEN_EXP_KEY) || "0", 10);
  if (Date.now() > exp) {
    localStorage.removeItem(TOKEN_KEY);
    localStorage.removeItem(TOKEN_EXP_KEY);
    return null;
  }
  return localStorage.getItem(TOKEN_KEY);
}
function setToken(token) {
  localStorage.setItem(TOKEN_KEY, token);
  localStorage.setItem(TOKEN_EXP_KEY, String(Date.now() + TOKEN_TTL_MS));
}
async function authFetch(path, options = {}) {
  const token = getToken();
  options.headers = Object.assign({}, options.headers, {
    "Content-Type": "application/json",
    ...(token ? { Authorization: `Bearer ${token}` } : {}),
  });
  return fetch(API_BASE + path, options);
}

/* ---------- 密码流程 ---------- */
let pendingAction = null;
function requirePassword(action) {
  if (getToken()) { action(); return; }
  pendingAction = action;
  document.getElementById("pwInput").value = "";
  document.getElementById("pwOverlay").classList.add("show");
}
document.getElementById("pwCancel").onclick = () => {
  document.getElementById("pwOverlay").classList.remove("show");
  pendingAction = null;
};
document.getElementById("pwConfirm").onclick = async () => {
  const pw = document.getElementById("pwInput").value;
  try {
    const res = await fetch(API_BASE + "/api/login", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    const data = await res.json();
    if (data.ok) {
      setToken(data.token);
      document.getElementById("pwOverlay").classList.remove("show");
      showToast("验证成功，365 天内免密操作", "success");
      if (pendingAction) pendingAction();
      pendingAction = null;
    } else {
      showToast("密码错误，请重新输入", "error");
    }
  } catch (e) {
    showToast("网络错误，请检查后重试", "error");
  }
};

/* ---------- 搜索 + 搜索提示 ---------- */
const queryInput = document.getElementById("query");
const suggestList = document.getElementById("suggestList");
let suggestTimer = null;
let suggestItems = [];
let highlightIndex = -1;

document.getElementById("go").onclick = () => doSearch();

function doSearch(text) {
  const q = (text !== undefined ? text : queryInput.value).trim();
  if (!q) { showToast("请输入搜索内容"); return; }
  hideSuggest();
  window.open(SEARCH_ENGINES[currentEngine](q), "_blank");
}

async function fetchSuggestions(q) {
  try {
    const res = await fetch(`${API_BASE}/api/suggest?engine=${currentEngine}&q=${encodeURIComponent(q)}`);
    const data = await res.json();
    return data.ok ? (data.suggestions || []) : [];
  } catch (e) {
    return [];
  }
}

function renderSuggest(list) {
  suggestItems = list;
  highlightIndex = -1;
  if (!list.length) { hideSuggest(); return; }
  suggestList.innerHTML = list
    .map((s, i) => `<div class="suggest-item" data-idx="${i}"><span class="s-icon"><span class="iconify" data-icon="solar:bookmark-search-linear"></span></span><span>${escapeHtml(s)}</span></div>`)
    .join("");
  suggestList.querySelectorAll(".suggest-item").forEach(el => {
    el.addEventListener("click", () => {
      const idx = parseInt(el.dataset.idx, 10);
      queryInput.value = suggestItems[idx];
      doSearch(suggestItems[idx]);
    });
  });
  suggestList.classList.add("show");
}

function hideSuggest() {
  suggestList.classList.remove("show");
  suggestItems = [];
  highlightIndex = -1;
}

function updateHighlight() {
  suggestList.querySelectorAll(".suggest-item").forEach((el, i) => {
    el.classList.toggle("highlight", i === highlightIndex);
  });
}

queryInput.addEventListener("input", () => {
  const q = queryInput.value.trim();
  clearTimeout(suggestTimer);
  if (!q) { hideSuggest(); return; }
  suggestTimer = setTimeout(async () => {
    const list = await fetchSuggestions(q);
    renderSuggest(list);
  }, 220);
});

queryInput.addEventListener("keydown", e => {
  if (suggestItems.length && suggestList.classList.contains("show")) {
    if (e.key === "ArrowDown") {
      e.preventDefault();
      highlightIndex = (highlightIndex + 1) % suggestItems.length;
      updateHighlight();
      return;
    }
    if (e.key === "ArrowUp") {
      e.preventDefault();
      highlightIndex = (highlightIndex - 1 + suggestItems.length) % suggestItems.length;
      updateHighlight();
      return;
    }
    if (e.key === "Escape") { hideSuggest(); return; }
  }
  if (e.key === "Enter") {
    if (highlightIndex >= 0 && suggestItems[highlightIndex]) {
      queryInput.value = suggestItems[highlightIndex];
      doSearch(suggestItems[highlightIndex]);
    } else {
      doSearch();
    }
  }
});

document.addEventListener("click", (e) => {
  if (!e.target.closest(".suggest-wrap")) hideSuggest();
});

/* ---------- 书签数据 + 分类 ---------- */
let bookmarks = [];
let activeCategory = "__all__";
let searchKeyword = "";

async function loadBookmarks() {
  try {
    const res = await fetch(API_BASE + "/api/bookmarks");
    const data = await res.json();
    bookmarks = data.ok ? data.data : [];
  } catch (e) {
    bookmarks = [];
    showToast("加载书签失败，请检查网络或接口地址", "error");
  }
  renderSidebar();
  renderGrid();
}

function getCategoryCounts() {
  const map = {};
  bookmarks.forEach(bm => {
    const cat = bm.category || "未分类";
    map[cat] = (map[cat] || 0) + 1;
  });
  return map;
}

function renderSidebar() {
  const counts = getCategoryCounts();
  const catList = document.getElementById("catList");
  const cats = Object.keys(counts).sort((a, b) => counts[b] - counts[a]);
  let html = `<div class="cat-item ${activeCategory === '__all__' ? 'active' : ''}" data-cat="__all__">
      <span>全部</span><span class="cat-count">${bookmarks.length}</span></div>`;
  html += `<div class="cat-item ${activeCategory === '__fav__' ? 'active' : ''}" data-cat="__fav__">
      <span>★ 收藏</span><span class="cat-count">${bookmarks.filter(b=>b.favorite).length}</span></div>`;
  cats.forEach(cat => {
    html += `<div class="cat-item ${activeCategory === cat ? 'active' : ''}" data-cat="${escapeHtml(cat)}">
        <span>${escapeHtml(cat)}</span><span class="cat-count">${counts[cat]}</span></div>`;
  });
  catList.innerHTML = html;
  catList.querySelectorAll(".cat-item").forEach(el => {
    el.addEventListener("click", () => {
      activeCategory = el.dataset.cat;
      renderSidebar();
      renderGrid();
      window.scrollTo({ top: 0, behavior: "smooth" });
    });
  });
}

function renderGrid() {
  const grid = document.getElementById("grid");
  const sectionTitle = document.getElementById("sectionTitle");
  let list = bookmarks;
  let baseTitle = "全部书签";
  if (activeCategory === "__fav__") {
    list = bookmarks.filter(b => b.favorite);
    baseTitle = "★ 收藏";
  } else if (activeCategory !== "__all__") {
    list = bookmarks.filter(b => (b.category || "未分类") === activeCategory);
    baseTitle = activeCategory;
  }

  const kw = searchKeyword.trim().toLowerCase();
  if (kw) {
    list = list.filter(b => {
      const title = (b.title || "").toLowerCase();
      const desc = (b.desc || "").toLowerCase();
      const tags = (b.tags || []).join(",").toLowerCase();
      return title.includes(kw) || desc.includes(kw) || tags.includes(kw);
    });
    sectionTitle.textContent = `${baseTitle} · 搜索"${searchKeyword.trim()}"（${list.length} 条）`;
  } else {
    sectionTitle.textContent = baseTitle;
  }

  grid.innerHTML = "";
  document.getElementById("emptyTip").style.display = list.length ? "none" : "block";
  list
    .slice()
    .sort((a, b) => (b.favorite - a.favorite))
    .forEach(bm => {
      const card = document.createElement("a");
      card.className = "bm-card";
      card.href = bm.url;
      card.target = "_blank";
      card.innerHTML = `
        ${bm.favorite ? '<span class="fav-badge">★</span>' : ""}
        <span class="bm-actions">
          <span data-act="edit">✎</span>
          <span data-act="del"><span class="iconify" data-icon="solar:close-circle-linear"></span></span>
        </span>
        <div class="bm-icon"><img src="${favicon(bm.url)}" onerror="this.style.display='none'"/></div>
        <div class="bm-title">${escapeHtml(bm.title || bm.url)}</div>
      `;
      card.querySelector('[data-act="edit"]').addEventListener("click", ev => {
        ev.preventDefault(); ev.stopPropagation();
        requirePassword(() => openEditModal(bm));
      });
      card.querySelector('[data-act="del"]').addEventListener("click", ev => {
        ev.preventDefault(); ev.stopPropagation();
        requirePassword(() => openDeleteModal(bm.id));
      });
      grid.appendChild(card);
    });
}

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str;
  return d.innerHTML;
}

/* ---------- 增/改 弹窗 ---------- */
const editOverlay = document.getElementById("editOverlay");
let editingId = null;

function openEditModal(bm) {
  editingId = bm ? bm.id : null;
  document.getElementById("editTitle").textContent = bm ? "编辑书签" : "添加书签";
  document.getElementById("f-title").value = bm ? bm.title : "";
  document.getElementById("f-url").value = bm ? bm.url : "";
  document.getElementById("f-category").value = bm ? bm.category : "";
  document.getElementById("f-tags").value = bm ? (bm.tags || []).join(",") : "";
  document.getElementById("f-desc").value = bm ? bm.desc : "";
  document.getElementById("f-fav").checked = bm ? !!bm.favorite : false;
  editOverlay.classList.add("show");
}
document.getElementById("addBtn").onclick = () => requirePassword(() => openEditModal(null));
document.getElementById("editCancel").onclick = () => editOverlay.classList.remove("show");

document.getElementById("editSave").onclick = async () => {
  const payload = {
    title: document.getElementById("f-title").value.trim(),
    url: document.getElementById("f-url").value.trim(),
    category: document.getElementById("f-category").value.trim() || "未分类",
    tags: document.getElementById("f-tags").value.split(",").map(s => s.trim()).filter(Boolean),
    desc: document.getElementById("f-desc").value.trim(),
    favorite: document.getElementById("f-fav").checked,
  };
  if (!payload.url) { showToast("URL 不能为空", "error"); return; }

  try {
    if (editingId) {
      await authFetch(`/api/bookmarks/${editingId}`, { method: "PUT", body: JSON.stringify(payload) });
      showToast("修改成功", "success");
    } else {
      await authFetch(`/api/bookmarks`, { method: "POST", body: JSON.stringify(payload) });
      showToast("添加成功", "success");
    }
    editOverlay.classList.remove("show");
    await loadBookmarks();
  } catch (e) {
    showToast("操作失败，请重试", "error");
  }
};

/* ---------- 删除弹窗 ---------- */
const delOverlay = document.getElementById("delOverlay");
let deletingId = null;

function openDeleteModal(id) {
  deletingId = id;
  delOverlay.classList.add("show");
}
document.getElementById("delCancel").onclick = () => { delOverlay.classList.remove("show"); deletingId = null; };

const bmSearchInput = document.getElementById("bmSearch");
const bmSearchClear = document.getElementById("bmSearchClear");

loadBookmarks();


const mainScroller = document.getElementById('mainScroller') || document.querySelector('.main');

function updateBeijingTime() {
  const now = new Date();
  const formatter = new Intl.DateTimeFormat('zh-CN', {
    timeZone: 'Asia/Shanghai',
    year: 'numeric',
    month: '2-digit',
    day: '2-digit',
    weekday: 'short',
    hour: '2-digit',
    minute: '2-digit',
    second: '2-digit',
    hour12: false
  });

  const parts = formatter.formatToParts(now).reduce((acc, item) => {
    acc[item.type] = item.value;
    return acc;
  }, {});

  const main = document.getElementById('bjDateMain');
  const sub = document.getElementById('bjDateSub');

  if (main) main.textContent = `北京时间 ${parts.year}-${parts.month}-${parts.day} ${parts.weekday}`;
  if (sub) sub.textContent = `${parts.hour}:${parts.minute}:${parts.second}`;
}

  }

  if (deleteBtn) {
    if (typeof openDeleteModal === 'function') openDeleteModal(item);
    else if (typeof confirmDelete === 'function') confirmDelete(item);
    else if (typeof deleteBookmark === 'function') deleteBookmark(item);
  }
});

</script>
</body>
</html>
